name: Release Packaging Dry-Run

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dry-run:
    name: Dry run packaging on ${{ matrix.os }} for ${{ matrix.target }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-nsis
            arch: x64
          - os: windows-latest
            target: windows-nsis
            arch: arm64
          - os: macos-latest
            target: macos-dmg
            arch: x64
          - os: macos-latest
            target: macos-dmg
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run build
        run: npm run build

      - name: Build unsigned Windows NSIS package
        if: matrix.target == 'windows-nsis'
        run: npm run dist:win -- --${{ matrix.arch }}

      - name: Build unsigned macOS DMG package
        if: matrix.target == 'macos-dmg'
        run: npm run dist:mac -- --${{ matrix.arch }}
